name: Facebook Auto Post

on:
  schedule:
    # Ulaanbaatar time: 08:00, 10:00, 12:00, 14:00, 16:00, 18:00, 20:00, 22:00, 00:00
    # UTC equivalent: 00:00, 02:00, 04:00, 06:00, 08:00, 10:00, 12:00, 14:00, 16:00
    - cron: "0 0,2,4,6,8,10,12,14,16 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: facebook-autopost
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restore posting state cache
        uses: actions/cache/restore@v4
        with:
          path: .state
          key: fb-state-${{ github.run_id }}
          restore-keys: |
            fb-state-

      - name: Ensure state directory
        run: mkdir -p .state

      - name: DNS diagnostics
        run: |
          python - <<'PY'
          import socket
          hosts = [
              "graph.facebook.com",
              "generativelanguage.googleapis.com",
          ]
          for host in hosts:
              try:
                  ip = socket.gethostbyname(host)
                  print(f"[DNS OK] {host} -> {ip}")
              except Exception as exc:
                  print(f"[DNS WARN] {host}: {exc}")
          PY

      - name: Run autopost
        env:
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
          AI_PROVIDER: "gemini"
          REQUIRE_AI_CONTENT: "1"
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEYS: "${{ secrets.GEMINI_API_KEY }},${{ secrets.GEMINI_API_KEY_2 }}"
          GEMINI_MODEL: "gemini-2.5-flash"
          CONTENT_TIMEZONE: "Asia/Ulaanbaatar"
          USE_TIME_SLOT_SCHEDULE: "1"
          ENABLE_MIDNIGHT_POST: "1"
          PIN_SCHEDULED_POSTS: "0"
          PIN_CATEGORIES: "horoscope,daily_guidance"
          HTTP_RETRIES: "4"
          HTTP_RETRY_BACKOFF_SEC: "3"
          DRY_RUN: "0"
          PYTHONUNBUFFERED: "1"
        run: python scripts/generate_and_post.py

      - name: Save posting state cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .state
          key: fb-state-${{ github.run_id }}
