name: Facebook Auto Post

on:
  schedule:
    # Ulaanbaatar time: 06:00, 10:00, 14:00, 18:00, 22:00
    # UTC cron hours (sorted): 02:00, 06:00, 10:00, 14:00, 22:00
    - cron: "0 2,6,10,14,22 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: facebook-autopost
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Node dependencies
        run: npm ci

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restore posting state cache
        uses: actions/cache/restore@v4
        with:
          path: .state
          key: fb-state-${{ github.run_id }}
          restore-keys: |
            fb-state-

      - name: Ensure state directory
        run: mkdir -p .state

      - name: DNS diagnostics
        run: |
          python - <<'PY'
          import socket
          hosts = [
              "graph.facebook.com",
              "generativelanguage.googleapis.com",
          ]
          for host in hosts:
              try:
                  ip = socket.gethostbyname(host)
                  print(f"[DNS OK] {host} -> {ip}")
              except Exception as exc:
                  print(f"[DNS WARN] {host}: {exc}")
          PY

      - name: Secret diagnostics
        env:
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
          PIN_ACCESS_TOKEN: ${{ secrets.PIN_ACCESS_TOKEN }}
          FACEBOOK_USER_ACCESS_TOKEN: ${{ secrets.FACEBOOK_USER_ACCESS_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY2: ${{ secrets.GEMINI_API_KEY2 }}
        run: |
          python - <<'PY'
          import os

          for name in (
              "FACEBOOK_PAGE_ID",
              "FACEBOOK_PAGE_ACCESS_TOKEN",
              "PIN_ACCESS_TOKEN",
              "FACEBOOK_USER_ACCESS_TOKEN",
              "GEMINI_API_KEY",
              "GEMINI_API_KEY_2",
              "GEMINI_API_KEY2",
          ):
              value = os.getenv(name, "").strip()
              status = "OK" if value else "MISSING"
              print(f"[SECRET {status}] {name}")
          PY

      - name: Facebook token diagnostics
        env:
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.parse
          import urllib.request

          page_id = os.getenv("FACEBOOK_PAGE_ID", "").strip()
          token = os.getenv("FACEBOOK_PAGE_ACCESS_TOKEN", "").strip()
          if not page_id or not token:
              print("[FB CHECK] Skipped because FACEBOOK_PAGE_ID or FACEBOOK_PAGE_ACCESS_TOKEN is missing.")
              raise SystemExit(0)

          query = urllib.parse.urlencode(
              {
                  "fields": "id,name",
                  "access_token": token,
              }
          )
          url = f"https://graph.facebook.com/v23.0/{page_id}?{query}"
          try:
              with urllib.request.urlopen(url, timeout=30) as response:
                  payload = json.loads(response.read().decode("utf-8"))
              print(f"[FB CHECK] Page token can access page: {payload}")
          except Exception as exc:
              print(f"[FB CHECK] Failed to access target page: {exc}")
          PY

      - name: Run autopost
        env:
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
          PIN_ACCESS_TOKEN: ${{ secrets.PIN_ACCESS_TOKEN }}
          FACEBOOK_USER_ACCESS_TOKEN: ${{ secrets.FACEBOOK_USER_ACCESS_TOKEN }}
          AI_PROVIDER: "gemini"
          REQUIRE_AI_CONTENT: "1"
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY2: ${{ secrets.GEMINI_API_KEY2 }}
          GEMINI_API_KEYS: "${{ secrets.GEMINI_API_KEY }},${{ secrets.GEMINI_API_KEY_2 }},${{ secrets.GEMINI_API_KEY2 }}"
          GEMINI_MODEL: "gemini-3.1-flash-lite-preview"
          CONTENT_TIMEZONE: "Asia/Ulaanbaatar"
          USE_TIME_SLOT_SCHEDULE: "1"
          ENABLE_MIDNIGHT_POST: "1"
          PIN_SCHEDULED_POSTS: "1"
          PIN_CATEGORIES: "horoscope,zodiac_horoscope"
          HTTP_RETRIES: "4"
          HTTP_RETRY_BACKOFF_SEC: "3"
          DRY_RUN: "0"
          PYTHONUNBUFFERED: "1"
        run: python scripts/generate_and_post.py

      - name: Save posting state cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .state
          key: fb-state-${{ github.run_id }}
