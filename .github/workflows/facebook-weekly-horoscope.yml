name: Facebook Weekly Almanac Summary

on:
  schedule:
    # Every Monday 00:00 UTC (Ulaanbaatar: Monday 08:00)
    - cron: "0 0 * * 1"
  workflow_dispatch:
    inputs:
      manual_post_file:
        description: "Optional repo file path to post directly instead of AI generation"
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: facebook-weekly-horoscope
  cancel-in-progress: false

jobs:
  weekly-horoscope:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Node dependencies
        run: npm ci

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restore posting state cache
        uses: actions/cache/restore@v4
        with:
          path: .state
          key: fb-state-${{ github.run_id }}
          restore-keys: |
            fb-state-

      - name: Ensure state directory
        run: mkdir -p .state

      - name: Post manual weekly summary
        if: ${{ inputs.manual_post_file != '' }}
        env:
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
          MANUAL_POST_FILE: ${{ inputs.manual_post_file }}
        run: |
          python - <<'PY'
          import os
          import urllib.parse
          import urllib.request
          from pathlib import Path

          page_id = os.getenv("FACEBOOK_PAGE_ID", "").strip()
          token = os.getenv("FACEBOOK_PAGE_ACCESS_TOKEN", "").strip()
          post_file = os.getenv("MANUAL_POST_FILE", "").strip()

          if not page_id or not token or not post_file:
              raise SystemExit("missing_facebook_or_manual_file_input")

          message = Path(post_file).read_text(encoding="utf-8").strip()
          body = urllib.parse.urlencode(
              {
                  "message": message,
                  "access_token": token,
              }
          ).encode("utf-8")
          req = urllib.request.Request(
              f"https://graph.facebook.com/v23.0/{page_id}/feed",
              data=body,
              method="POST",
          )
          with urllib.request.urlopen(req, timeout=60) as response:
              print(response.read().decode("utf-8"))
          PY

      - name: Run weekly almanac summary post
        if: ${{ inputs.manual_post_file == '' }}
        env:
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
          AI_PROVIDER: "deepseek"
          REQUIRE_AI_CONTENT: "1"
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_MODEL: "deepseek-chat"
          HTTP_RETRIES: "4"
          HTTP_RETRY_BACKOFF_SEC: "3"
          DRY_RUN: "0"
          POST_CATEGORY: "weekly_horoscope"
          PYTHONUNBUFFERED: "1"
        run: python scripts/generate_and_post.py

      - name: Save posting state cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .state
          key: fb-state-${{ github.run_id }}
