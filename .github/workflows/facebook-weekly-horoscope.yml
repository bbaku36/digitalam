name: Facebook Weekly Horoscope

on:
  schedule:
    # Every Monday 00:05 UTC (Ulaanbaatar: Monday 08:05)
    - cron: "5 0 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: facebook-weekly-horoscope
  cancel-in-progress: false

jobs:
  weekly-horoscope:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restore posting state cache
        uses: actions/cache/restore@v4
        with:
          path: .state
          key: fb-state-${{ github.run_id }}
          restore-keys: |
            fb-state-

      - name: Ensure state directory
        run: mkdir -p .state

      - name: Run weekly zodiac horoscope post
        env:
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
          AI_PROVIDER: "gemini"
          REQUIRE_AI_CONTENT: "1"
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY2: ${{ secrets.GEMINI_API_KEY2 }}
          GEMINI_API_KEYS: "${{ secrets.GEMINI_API_KEY }},${{ secrets.GEMINI_API_KEY_2 }},${{ secrets.GEMINI_API_KEY2 }}"
          GEMINI_MODEL: "gemini-2.5-flash"
          HTTP_RETRIES: "4"
          HTTP_RETRY_BACKOFF_SEC: "3"
          DRY_RUN: "0"
          POST_CATEGORY: "weekly_horoscope"
          PYTHONUNBUFFERED: "1"
        run: python scripts/generate_and_post.py

      - name: Save posting state cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .state
          key: fb-state-${{ github.run_id }}
